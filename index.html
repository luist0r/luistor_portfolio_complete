<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luist0r | Portfolio</title>
  <meta
    name="description"
    content="Arquitectura de flujo, capital y decisiones estratégicas."
  />
  <meta property="og:title" content="Luist0r | Portfolio" />
  <meta
    property="og:description"
    content="Arquitectura de flujo, capital y decisiones estratégicas."
  />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://luistor.uk" />
  <meta property="og:image" content="https://luistor.uk/assets/og-image.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #0d1424;
      --panel: #161f33;
      --panel-2: #1b2640;
      --border: #2a3550;
      --text: #f3efe6;
      --muted: #b8c0d4;
      --accent: #d8b36a;
      --accent-hover: #e3c27f;
      --button-text: #1a1a1a;
      --secondary-border: #3b4968;
      --secondary-hover: rgba(255, 255, 255, 0.04);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(216, 179, 106, 0.08), transparent 28%),
        linear-gradient(180deg, #0b1220 0%, #0d1424 100%);
      color: var(--text);
      font-family: "Inter", sans-serif;
      min-height: 100vh;
      padding: 48px 20px;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    .contact-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 48px;
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 56px 48px;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.02);
      position: relative;
      overflow: hidden;
    }

    .contact-section::before {
      content: "";
      position: absolute;
      inset: auto -80px -80px auto;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(216, 179, 106, 0.12), transparent 65%);
      pointer-events: none;
    }

    .contact-copy {
      max-width: 620px;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 18px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .contact-copy h2 {
      font-family: "Playfair Display", serif;
      font-size: clamp(2.6rem, 5vw, 4.8rem);
      line-height: 0.96;
      letter-spacing: -0.03em;
      color: var(--text);
      max-width: 540px;
      margin-bottom: 22px;
    }

    .contact-copy p {
      font-size: 1.28rem;
      line-height: 1.65;
      color: var(--muted);
      max-width: 700px;
    }

    .contact-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 18px;
      flex-wrap: wrap;
      min-width: 320px;
      position: relative;
      z-index: 1;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 60px;
      padding: 0 28px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      transition:
        transform 0.2s ease,
        background-color 0.2s ease,
        border-color 0.2s ease,
        color 0.2s ease,
        box-shadow 0.2s ease;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--accent);
      color: var(--button-text);
      border: 1px solid var(--accent);
      box-shadow: 0 10px 30px rgba(216, 179, 106, 0.24);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
      box-shadow: 0 12px 32px rgba(216, 179, 106, 0.3);
    }

    .btn-secondary {
      background: transparent;
      color: #eef2fb;
      border: 1px solid var(--secondary-border);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .btn-secondary:hover {
      background: var(--secondary-hover);
      border-color: #556586;
    }

    @media (max-width: 920px) {
      .contact-section {
        flex-direction: column;
        align-items: flex-start;
        padding: 40px 26px;
        gap: 30px;
      }

      .contact-actions {
        width: 100%;
        justify-content: flex-start;
        min-width: 0;
      }

      .contact-copy h2 {
        max-width: 100%;
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 24px 14px;
      }

      .contact-section {
        border-radius: 24px;
        padding: 32px 20px;
      }

      .contact-copy p {
        font-size: 1.05rem;
      }

      .contact-actions {
        flex-direction: column;
        align-items: stretch;
        width: 100%;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="contact-section" id="contacto">
      <div class="contact-copy">
        <span class="eyebrow">— Contacto</span>
        <h2>Agenda una conversación inicial</h2>
        <p>
          Si necesitas claridad sobre flujo, capital o decisiones financieras,
          este es el mejor punto de entrada.
        </p>
      </div>

      <div class="contact-actions">
        <a class="btn btn-primary" href="https://luistor.uk/#contacto">
          Agendar ahora
        </a>
        <a class="btn btn-secondary" href="mailto:hell@luistor.uk">
          Enviar email
        </a>
      </div>
    </section>
  </main>
</body>
</html>
